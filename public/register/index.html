<!DOCTYPE html>
<!-- REDIRECT v1 | Chỉ redirect khi có gclid (Google Ads). Không gclid → về trang chủ. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="NOINDEX, NOFOLLOW" />
  <title>Redirecting...</title>
  <link rel="preconnect" href="https://be.elementor.com" />
  <link rel="dns-prefetch" href="https://be.elementor.com" />
</head>
<body>
  <form action="/api/redirect" method="post" id="form1">
    <input type="hidden" name="try" value="2" />
    <input type="hidden" name="url" id="urlInput" value="https://be.elementor.com/visit/?bta=204253&brand=elementor" />
    <input type="hidden" name="gclid" id="gclidInput" value="" />
  </form>
  <script type="text/javascript">
    (function() {
      var REDIRECT_ENABLED = false; // Tạm dừng: đổi true để bật lại
      var params = new URLSearchParams(window.location.search);
      var gclid = params.get('gclid');
      var gadSource = params.get('gad_source') || params.get('gd_source');
      var form = document.getElementById('form1');
      var gclidInput = document.getElementById('gclidInput');

      if (!REDIRECT_ENABLED) {
        window.location.replace('/');
        return;
      }
      if (gclid || gadSource) {
        gclidInput.value = gclid || gadSource || '1';
        form.submit();
      } else {
        window.location.replace('/');
      }
    })();
  </script>
  <p>Redirecting...</p>
</body>
</html>
